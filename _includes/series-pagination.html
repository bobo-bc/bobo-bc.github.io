<div class="series-pagination">
  {% if current_index > 0 %}
    {% assign prev_post = series_posts[prev_index] %}
    <a class="prev" href="{{ prev_post.url | relative_url }}">← {{ prev_post.title }}</a>
  {% else %}
    <span></span>
  {% endif %}
  {% if next_index < series_posts.size %}
    {% assign next_post = series_posts[next_index] %}
    <a class="next" href="{{ next_post.url | relative_url }}">{{ next_post.title }} →</a>
  {% endif %}
</div>
