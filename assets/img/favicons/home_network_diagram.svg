<svg width="100%" viewBox="0 0 680 620" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: sans-serif; fill: #1a1a1a; }
    .th { font-size: 14px; font-weight: 500; }
    .ts { font-size: 12px; font-weight: 400; fill: #555; }

    /* Gray */
    .c-gray rect { fill: #F1EFE8; stroke: #5F5E5A; }
    .c-gray text { fill: #2C2C2A; }
    .c-gray .ts { fill: #5F5E5A; }

    /* Blue */
    .c-blue rect { fill: #E6F1FB; stroke: #185FA5; }
    .c-blue text { fill: #0C447C; }
    .c-blue .ts { fill: #185FA5; }

    /* Purple */
    .c-purple rect { fill: #EEEDFE; stroke: #534AB7; }
    .c-purple text { fill: #3C3489; }
    .c-purple .ts { fill: #534AB7; }

    /* Teal */
    .c-teal rect { fill: #E1F5EE; stroke: #0F6E56; }
    .c-teal text { fill: #085041; }
    .c-teal .ts { fill: #0F6E56; }

    /* Amber */
    .c-amber rect { fill: #FAEEDA; stroke: #854F0B; }
    .c-amber text { fill: #633806; }
    .c-amber .ts { fill: #854F0B; }

    .arr { stroke: #888780; stroke-width: 1.5; fill: none; }
  </style>
</defs>

<!-- Internet cloud -->
<g class="c-gray">
  <rect x="255" y="14" width="170" height="44" rx="22" stroke-width="0.5"/>
  <text class="th" x="340" y="36" text-anchor="middle" dominant-baseline="central">Internet (ISP)</text>
</g>

<!-- ISP Router -->
<g class="c-gray">
  <rect x="220" y="90" width="240" height="54" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="110" text-anchor="middle" dominant-baseline="central">ISP Modem / Router</text>
  <text class="ts" x="340" y="128" text-anchor="middle" dominant-baseline="central">192.168.0.1 — coax + TV services</text>
</g>

<!-- Unifi gateway -->
<g class="c-blue">
  <rect x="200" y="184" width="280" height="54" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="204" text-anchor="middle" dominant-baseline="central">Unifi Gateway Ultra</text>
  <text class="ts" x="340" y="222" text-anchor="middle" dominant-baseline="central">WAN: 192.168.1.50 — routes all three VLANs</text>
</g>

<!-- Homelab VLAN -->
<g class="c-purple">
  <rect x="20" y="294" width="190" height="64" rx="8" stroke-width="0.5"/>
  <text class="th" x="115" y="314" text-anchor="middle" dominant-baseline="central">Homelab VLAN</text>
  <text class="ts" x="115" y="334" text-anchor="middle" dominant-baseline="central">10.0.0.0/24</text>
  <text class="ts" x="115" y="350" text-anchor="middle" dominant-baseline="central">Proxmox, servers</text>
</g>

<!-- Trusted VLAN -->
<g class="c-teal">
  <rect x="245" y="294" width="190" height="64" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="314" text-anchor="middle" dominant-baseline="central">Trusted VLAN (T-net)</text>
  <text class="ts" x="340" y="334" text-anchor="middle" dominant-baseline="central">10.0.1.0/24</text>
  <text class="ts" x="340" y="350" text-anchor="middle" dominant-baseline="central">iPhones, laptops</text>
</g>

<!-- IoT VLAN -->
<g class="c-amber">
  <rect x="468" y="294" width="192" height="64" rx="8" stroke-width="0.5"/>
  <text class="th" x="564" y="314" text-anchor="middle" dominant-baseline="central">IoT VLAN (I-net)</text>
  <text class="ts" x="564" y="334" text-anchor="middle" dominant-baseline="central">10.0.2.0/24</text>
  <text class="ts" x="564" y="350" text-anchor="middle" dominant-baseline="central">Smart home devices</text>
</g>

<!-- Homelab devices -->
<g class="c-purple">
  <rect x="20" y="412" width="190" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="115" y="430" text-anchor="middle" dominant-baseline="central">Proxmox host</text>
  <text class="ts" x="115" y="447" text-anchor="middle" dominant-baseline="central">10.0.0.x — WiFi AP: .200</text>
</g>

<!-- Trusted devices -->
<g class="c-teal">
  <rect x="245" y="412" width="190" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="430" text-anchor="middle" dominant-baseline="central">Personal devices</text>
  <text class="ts" x="340" y="447" text-anchor="middle" dominant-baseline="central">DHCP: .101–.254</text>
</g>

<!-- IoT devices -->
<g class="c-amber">
  <rect x="468" y="412" width="192" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="564" y="430" text-anchor="middle" dominant-baseline="central">Home Assistant VM</text>
  <text class="ts" x="564" y="447" text-anchor="middle" dominant-baseline="central">10.0.2.4</text>
  <text class="ts" x="564" y="463" text-anchor="middle" dominant-baseline="central">Plex LXC: 10.0.2.10</text>
</g>

<!-- DNS box -->
<g class="c-gray">
  <rect x="160" y="520" width="360" height="54" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="540" text-anchor="middle" dominant-baseline="central">Local DNS (Unifi / Pi-hole)</text>
  <text class="ts" x="340" y="558" text-anchor="middle" dominant-baseline="central">A records + CNAMEs — serves all VLANs</text>
</g>

<!-- Connections -->
<line x1="340" y1="58" x2="340" y2="88" class="arr" marker-end="url(#arrow)"/>
<line x1="340" y1="144" x2="340" y2="182" class="arr" marker-end="url(#arrow)"/>
<path d="M310 238 L115 292" fill="none" class="arr" marker-end="url(#arrow)"/>
<line x1="340" y1="238" x2="340" y2="292" class="arr" marker-end="url(#arrow)"/>
<path d="M370 238 L564 292" fill="none" class="arr" marker-end="url(#arrow)"/>
<line x1="115" y1="358" x2="115" y2="410" class="arr" marker-end="url(#arrow)"/>
<line x1="340" y1="358" x2="340" y2="410" class="arr" marker-end="url(#arrow)"/>
<line x1="564" y1="358" x2="564" y2="410" class="arr" marker-end="url(#arrow)"/>
<path d="M340 520 L340 490 L340 240" fill="none" stroke="#888780" stroke-width="0.5" stroke-dasharray="4 3" opacity="0.5"/>

<!-- Firewall rule labels -->
<text class="ts" x="136" y="284" text-anchor="middle" style="fill:#534AB7;">T-net sees homelab</text>
<path d="M245 326 L210 326" fill="none" stroke="#888780" stroke-width="0.5" stroke-dasharray="3 3"/>
<text class="ts" x="564" y="288" text-anchor="middle" style="fill:#854F0B;">IoT isolated</text>
</svg>
