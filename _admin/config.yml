backend:
  name: github repo: bobo-bc/bobo-bc.github.io branch: main media_folder: 
"assets/img" public_folder: "/assets/img" collections:
  - name: "posts"
    label: "Blog Posts" folder: "_posts" create: true slug: 
    "{{year}}-{{month}}-{{day}}-{{slug}}" fields:
      - { label: "Title", name: "title", widget: "string" } - { label: 
      "Date", name: "date", widget: "datetime" } - { label: "Body", name: 
      "body", widget: "markdown" } - { label: "Image", name: "image", 
      widget: "image" }
  - name: "pages"
    label: "Pages" folder: "_pages" create: true slug: "{{slug}}" fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Layout", name: "layout", widget: "string" }
